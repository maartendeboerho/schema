<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training Progressie</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #131313;
    --surface2: #1a1a1a;
    --border: #242424;
    --border2: #333;
    --text: #ffffff;
    --muted: #888;
    --muted2: #bbb;
    --yellow: #d4ff00;
    --green: #00ff88;
    --amber: #ffaa00;
    --mono: 'DM Mono', monospace;
    --sans: 'Syne', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); min-height: 100vh; }

  /* ── HEADER ── */
  .header { padding: 1.5rem 1.5rem 1.25rem; border-bottom: 1px solid var(--border); }
  .header h1 { font-family: var(--sans); font-weight: 800; font-size: clamp(1.6rem,5vw,2.4rem); letter-spacing: -0.04em; }
  .header h1 em { color: var(--yellow); font-style: normal; }
  .header-sub { font-size: 0.72rem; color: var(--muted); margin-top: 0.35rem; letter-spacing: 0.05em; text-transform: uppercase; }

  /* ── WEEK TABS ── */
  .week-tabs { display: flex; overflow-x: auto; border-bottom: 1px solid var(--border); scrollbar-width: none; }
  .week-tabs::-webkit-scrollbar { display: none; }
  .wt {
    flex: 1; min-width: 72px; padding: 0.8rem 0.4rem 0.7rem;
    background: none; border: none; border-right: 1px solid var(--border);
    cursor: pointer; text-align: center; position: relative; transition: background 0.12s;
  }
  .wt:last-child { border-right: none; }
  .wt-num  { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.07em; text-transform: uppercase; display: block; margin-bottom: 3px; }
  .wt-pct  { font-family: var(--sans); font-weight: 800; font-size: 1rem; display: block; }
  .wt-lbl  { font-size: 0.57rem; color: var(--muted); display: block; margin-top: 2px; }
  .wt.active { background: rgba(212,255,0,0.05); }
  .wt.active::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; background:var(--yellow); }
  .c-amber  { color: var(--amber); }
  .c-yellow { color: var(--yellow); }
  .c-green  { color: var(--green); }

  /* ── PHASE BANNER ── */
  .phase-banner {
    display: flex; align-items: center; gap: 12px;
    padding: 0.8rem 1rem; margin: 1.25rem 0; border-radius: 4px; border: 1px solid;
  }
  .pb-icon { font-size: 1.1rem; }
  .pb-body { flex: 1; }
  .pb-title { font-family: var(--sans); font-weight: 700; font-size: 0.88rem; }
  .pb-desc  { font-size: 0.68rem; color: var(--muted2); margin-top: 2px; }
  .pb-date  { font-size: 0.65rem; color: var(--muted); white-space: nowrap; }
  .ph-rehab { background: rgba(255,170,0,0.05); border-color: rgba(255,170,0,0.22); }
  .ph-build { background: rgba(212,255,0,0.04); border-color: rgba(212,255,0,0.18); }
  .ph-full  { background: rgba(0,255,136,0.04); border-color: rgba(0,255,136,0.18); }

  /* ── DAY TABS ── */
  .day-tabs { display: flex; overflow-x: auto; border-bottom: 1px solid var(--border); scrollbar-width: none; margin-bottom: 1.25rem; }
  .day-tabs::-webkit-scrollbar { display: none; }
  .dt {
    flex: 1; min-width: 64px; padding: 0.65rem 0.4rem 0.55rem;
    background: none; border: none; border-right: 1px solid var(--border);
    cursor: pointer; text-align: center; position: relative; transition: background 0.12s;
  }
  .dt:last-child { border-right: none; }
  .dt-name { font-family: var(--sans); font-weight: 700; font-size: 0.8rem; display: block; color: var(--text); }
  .dt-type { font-size: 0.57rem; color: var(--muted); display: block; margin-top: 2px; letter-spacing: 0.04em; }
  .dt.active { background: rgba(212,255,0,0.05); }
  .dt.active::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; background:var(--yellow); }
  .dt.is-rest .dt-name { color: var(--border2); }

  /* ── CONTENT AREA ── */
  .content-area { padding: 0 1.5rem 3rem; max-width: 820px; }
  @media(max-width:600px) { .content-area { padding: 0 1rem 3rem; } }

  /* ── EXERCISE TABLE ── */
  .ex-table { width: 100%; border-collapse: collapse; font-size: 0.76rem; margin-bottom: 0.85rem; }
  .ex-table th { font-weight: 400; font-size: 0.6rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; padding: 5px 8px; border-bottom: 1px solid var(--border); text-align: left; }
  .ex-table td { padding: 9px 8px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .ex-table tr:last-child td { border-bottom: none; }
  .td-name { color: var(--text); font-weight: 500; line-height: 1.4; }
  .td-sets { text-align: center; color: var(--muted); white-space: nowrap; }
  .td-weight { text-align: center; font-family: var(--sans); font-weight: 700; font-size: 0.92rem; white-space: nowrap; }
  .td-reps { text-align: center; color: var(--muted); white-space: nowrap; }
  .td-rir { text-align: center; }
  .td-note { font-size: 0.63rem; color: var(--muted); line-height: 1.5; }
  .rir-pill { font-size: 0.6rem; padding: 2px 7px; border-radius: 2px; background: rgba(212,255,0,0.1); color: var(--yellow); }
  .ss-pill  { font-size: 0.57rem; padding: 1px 6px; border-radius: 2px; background: rgba(0,255,136,0.1); color: var(--green); margin-left: 5px; vertical-align: middle; }
  .spine-pill { font-size: 0.57rem; padding: 1px 5px; border-radius: 2px; background: rgba(255,170,0,0.1); color: var(--amber); margin-left: 5px; vertical-align: middle; }
  .ss-row td { background: rgba(0,255,136,0.025); }
  .wc-full  { color: var(--green); }
  .wc-build { color: var(--yellow); }
  .wc-rehab { color: var(--amber); }

  /* ── BLOCKS ── */
  .note { padding: 0.6rem 0.85rem; font-size: 0.71rem; color: var(--muted2); line-height: 1.7; border-radius: 0 3px 3px 0; margin-bottom: 0.85rem; border-left: 2px solid var(--yellow); background: rgba(212,255,0,0.04); }
  .note.amber { border-left-color: var(--amber); background: rgba(255,170,0,0.04); }
  .note.green { border-left-color: var(--green); background: rgba(0,255,136,0.04); }
  .note strong { color: var(--yellow); }
  .note.amber strong { color: var(--amber); }
  .note.green strong { color: var(--green); }

  .mcgill-block { background: rgba(255,170,0,0.04); border: 1px solid rgba(255,170,0,0.18); border-radius: 4px; padding: 0.8rem 1rem; margin-bottom: 0.85rem; }
  .mcgill-block .blk-title { font-size: 0.6rem; color: var(--amber); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.6rem; font-weight: 600; }
  .mcgill-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid rgba(255,170,0,0.1); font-size: 0.71rem; }
  .mcgill-row:last-child { border-bottom: none; }
  .mcgill-row span:first-child { color: var(--muted2); }
  .mcgill-row span:last-child  { color: var(--amber); font-weight: 500; }

  .morning-block { background: rgba(0,255,136,0.03); border: 1px solid rgba(0,255,136,0.14); border-radius: 4px; padding: 0.8rem 1rem; margin-bottom: 1.25rem; }
  .morning-block .blk-title { font-size: 0.6rem; color: var(--green); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.6rem; font-weight: 600; }
  .morning-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(0,255,136,0.08); font-size: 0.71rem; }
  .morning-row:last-child { border-bottom: none; }
  .morning-row span:first-child { color: var(--muted2); }
  .morning-row span:last-child  { color: var(--green); font-size: 0.66rem; }

  .rest-view { padding: 3rem 1rem; text-align: center; }
  .rest-view .ri { font-size: 2.2rem; margin-bottom: 0.75rem; }
  .rest-view h3  { font-family: var(--sans); font-weight: 700; font-size: 1rem; margin-bottom: 0.5rem; }
  .rest-view p   { font-size: 0.72rem; color: var(--muted2); line-height: 1.8; max-width: 280px; margin: 0 auto; }

  /* ── TIPS ── */
  .tips-section { border-top: 1px solid var(--border); padding-top: 1.75rem; margin-top: 2rem; }
  .tips-title { font-family: var(--sans); font-weight: 700; font-size: 0.95rem; margin-bottom: 1rem; }
  .tips-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px,1fr)); gap: 10px; }
  .tip-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 0.85rem; }
  .tip-icon  { font-size: 1.1rem; margin-bottom: 5px; }
  .tip-title { font-family: var(--sans); font-weight: 700; font-size: 0.8rem; margin-bottom: 4px; }
  .tip-body  { font-size: 0.69rem; color: var(--muted2); line-height: 1.7; }
</style>
</head>
<body>

<div class="header">
  <h1>Training<em>.</em></h1>
  <div class="header-sub">Maarten · 6 mei – 1 juli · 8 weken · Volledig schema</div>
</div>

<div class="week-tabs" id="weekTabs"></div>

<div class="content-area">
  <div id="phaseBanner"></div>
  <div id="morningRoutine"></div>
  <div class="day-tabs" id="dayTabs"></div>
  <div id="dayContent"></div>
</div>

<script>
// ─────────────────────────────────────────
// DATA
// ─────────────────────────────────────────

const WEEKS = [
  { w:1, date:'6–12 mei',      phase:'rehab', pct:50,  lbl:'Rehab 1', desc:'Activeren & ontspannen — techniek boven gewicht' },
  { w:2, date:'13–19 mei',     phase:'rehab', pct:50,  lbl:'Rehab 1', desc:'Activeren & ontspannen — techniek boven gewicht' },
  { w:3, date:'20–26 mei',     phase:'rehab', pct:60,  lbl:'Rehab 2', desc:'Stabiliteit opbouwen — lichte progressie' },
  { w:4, date:'27 mei–2 jun',  phase:'rehab', pct:60,  lbl:'Rehab 2', desc:'Stabiliteit opbouwen — lichte progressie' },
  { w:5, date:'3–9 jun',       phase:'build', pct:72,  lbl:'Opbouw',  desc:'Progressief belasten — dubbele progressie actief' },
  { w:6, date:'10–16 jun',     phase:'build', pct:72,  lbl:'Opbouw',  desc:'Progressief belasten — dubbele progressie actief' },
  { w:7, date:'17–23 jun',     phase:'full',  pct:85,  lbl:'Werkfase',desc:'Bijna volledig gewicht — normaal schema' },
  { w:8, date:'24 jun–1 jul',  phase:'full',  pct:85,  lbl:'Werkfase',desc:'Bijna volledig gewicht — daarna deload' },
];

const DAYS = [
  { key:'ma', short:'Ma', name:'Maandag',   type:'upper', lbl:'Upper A' },
  { key:'di', short:'Di', name:'Dinsdag',   type:'rest',  lbl:'Rust' },
  { key:'wo', short:'Wo', name:'Woensdag',  type:'lowerA',lbl:'Lower A' },
  { key:'do', short:'Do', name:'Donderdag', type:'rest',  lbl:'Rust' },
  { key:'vr', short:'Vr', name:'Vrijdag',   type:'upper', lbl:'Upper B' },
  { key:'za', short:'Za', name:'Zaterdag',  type:'lowerB',lbl:'Lower B' },
  { key:'zo', short:'Zo', name:'Zondag',    type:'upper', lbl:'Upper C' },
];

// Base weights (lower only)
const BASE = { squat:40, rdl:60, bss:14, hack:80, hipthrust:60, legcurl:50, calfstand:95, calfseat:30 };
const SPINE = ['squat','rdl','bss'];

// Upper exercises — no weights tracked here
const UPPER_A = [
  { name:'Barbell Bench Press',   sets:4, reps:'6–8',   rir:'2',   ss:false, note:'Set 1 = 50% opwarm · Set 2 = 75% · Set 3–4 = werkgewicht. Schouderbladen in bank. Eccentrisch 3 tellen.' },
  { name:'Barbell Row (overhand)',sets:4, reps:'6–8',   rir:'2',   ss:false, note:'Torso 45° voorover. Bar naar navel — niet naar borst. Eccentrisch 2 tellen omlaag.' },
  { name:'DB Shoulder Press',     sets:3, reps:'8–10',  rir:'2',   ss:false, note:'Bank 90°. Dumbells vrij bewegen. Veiliger dan barbell na bench press.' },
  { name:'Cable Lateral Raise',   sets:3, reps:'12–15', rir:'1–2', ss:true,  note:'Superset ↓ met Face Pull. Kabel laag, arm licht gebogen, tot schouderhoogte.' },
  { name:'Face Pull (kabel)',     sets:3, reps:'15–20', rir:'1–2', ss:true,  note:'Kabel boven ooghoogte. Touw naar gezicht. Schouders extern roteren. Niet overslaan.' },
];

const UPPER_B = [
  { name:'Incline DB Press',            sets:4, reps:'6–8',   rir:'2',   ss:false, note:'Set 1 = 50% opwarm · 30–45° bank. Elke zij onafhankelijk. Eccentrisch 3 tellen.' },
  { name:'Lat Pulldown (brede greep)',  sets:4, reps:'6–8',   rir:'2',   ss:false, note:'Licht achterover. Bar naar borst. Lats bewust aanspannen voor de beweging.' },
  { name:'Cable Curl (stang)',          sets:4, reps:'10–12', rir:'1–2', ss:true,  note:'Superset ↓ met Tricep Pushdown. Ellebogen naast torso. Constante spanning.' },
  { name:'Tricep Pushdown (touw)',      sets:4, reps:'12–15', rir:'1–2', ss:true,  note:'Ellebogen langs torso. Volledig uitstrekken. Laatste set: rest-pause.' },
  { name:'Cable Lateral Raise',         sets:3, reps:'12–15', rir:'1–2', ss:true,  note:'Superset ↓ met Overhead Extension.' },
  { name:'Triceps Overhead Extension',  sets:3, reps:'10–12', rir:'1–2', ss:true,  note:'Kabel hoog, touw. Ellebogen naast oren. Lange kop triceps maximaal actief.' },
];

const UPPER_C = [
  { name:'Cable Fly (mid-crossover)',  sets:3, reps:'12–15', rir:'1–2', ss:false, note:'Kabels op schouderhoogte. Armen licht gebogen. Denk: borst omhelzen.' },
  { name:'Single-arm DB Row',          sets:3, reps:'10–12', rir:'2',   ss:false, note:'Hand + knie op bank. Schouderblad volledig samentrekken bovenaan.' },
  { name:'Lat Pulldown (neutraal)',     sets:3, reps:'10–12', rir:'2',   ss:true,  note:'Superset ↓ met Lateral Raise. V-bar. Complementair aan brede greep.' },
  { name:'Cable Lateral Raise',        sets:3, reps:'12–15', rir:'1–2', ss:true,  note:'Derde wekelijkse schouderstimulus.' },
  { name:'Cable Curl (stang)',          sets:3, reps:'10–12', rir:'1–2', ss:true,  note:'Superset ↓ met Tricep Pushdown.' },
  { name:'Tricep Pushdown',            sets:3, reps:'12–15', rir:'1–2', ss:true,  note:'Laatste set: rest-pause voor extra volume.' },
  { name:'Face Pull (kabel)',           sets:3, reps:'15–20', rir:'1–2', ss:false, note:'Derde wekelijkse posteriore delt + rotatormanchet.' },
];

// Lower A exercises — week-aware
function getLowerA(weekNum) {
  if (weekNum === 1) {
    return [
      { id:'squat',    name:'Goblet Squat',          spine:false, sets:4, reps:'10–12', rir:'2',   note:'WEEK 1: Vervangt barbell squat. Kettlebell of dumbbell 8–12 kg voor de borst. Rechtopstaande romp. Eccentrisch 3 tellen. Minder spinale belasting.' },
      { id:'bss',      name:'Bulgarian Split Squat',  spine:false, sets:3, reps:'10–12', rir:'2',   note:'WEEK 1: Bodyweight — geen gewichten. Heupmobiliteit en glute-activatie zijn het doel. Achterste voet op bank, recht omlaag zakken.' },
      { id:'rdl',      name:'Romanian Deadlift',      spine:true,  sets:4, reps:'8–10',  rir:'2',   note:'WEEK 1: 40% van werkgewicht (24 kg). Bar langs benen. Heupen naar achter. Stop als hamstrings stretchen. Rug recht houden.' },
      { id:'legcurl',  name:'Leg Curl (liggend)',     spine:false, sets:3, reps:'10–12', rir:'2',   note:'Heupen op bank drukken. Eccentrisch 2 tellen. Laatste set: rest-pause.' },
      { id:'calfstand',name:'Calf Raise (staand)',    spine:false, sets:4, reps:'12–15', rir:'1–2', note:'Volledig zakken. Bovenin 1 sec vasthouden.' },
    ];
  }
  if (weekNum === 2) {
    return [
      { id:'squat',    name:'Barbell Back Squat',     spine:true,  sets:4, reps:'6–8',   rir:'2',   note:'WEEK 2: Terug naar barbell squat als week 1 goed ging. 50% werkgewicht (20 kg). Voeten schouderbreedte. Tot parallel. Eccentrisch 3 tellen.' },
      { id:'bss',      name:'Bulgarian Split Squat',  spine:true,  sets:3, reps:'8–10',  rir:'2',   note:'WEEK 2: Licht gewicht — 7,5 kg per dumbbell. Knie boven enkel. Glute van voorste been is primair.' },
      { id:'rdl',      name:'Romanian Deadlift',      spine:true,  sets:4, reps:'8–10',  rir:'2',   note:'WEEK 2: 50% werkgewicht (30 kg). Bar langs benen. Heupen naar achter. Stop als hamstrings stretchen.' },
      { id:'legcurl',  name:'Leg Curl (liggend)',     spine:false, sets:3, reps:'10–12', rir:'2',   note:'Heupen op bank drukken. Eccentrisch 2 tellen. Laatste set: rest-pause.' },
      { id:'calfstand',name:'Calf Raise (staand)',    spine:false, sets:4, reps:'12–15', rir:'1–2', note:'Volledig zakken. Bovenin 1 sec vasthouden.' },
    ];
  }
  // Week 3+
  return [
    { id:'squat',    name:'Barbell Back Squat',   spine:true,  sets:4, reps:'6–8',   rir:'2',   note:'Voeten schouderbreedte, tenen 15–30° uit. Tot parallel. Eccentrisch 3 tellen.' },
    { id:'bss',      name:'Bulgarian Split Squat',spine:true,  sets:3, reps:'8–10',  rir:'2',   note:'Per dumbbell. Achterste voet op bank. Knie boven enkel. Glute is primair.' },
    { id:'rdl',      name:'Romanian Deadlift',    spine:true,  sets:4, reps:'8–10',  rir:'2',   note:'Bar langs benen. Heupen naar achter. Stop als hamstrings stretchen.' },
    { id:'legcurl',  name:'Leg Curl (liggend)',   spine:false, sets:3, reps:'10–12', rir:'2',   note:'Heupen op bank drukken. Eccentrisch 2 tellen. Laatste set: rest-pause.' },
    { id:'calfstand',name:'Calf Raise (staand)',  spine:false, sets:4, reps:'12–15', rir:'1–2', note:'Volledig zakken. Bovenin 1 sec vasthouden.' },
  ];
}
const LOWER_A = getLowerA(1); // default, overridden in render

// Lower B exercises
const LOWER_B = [
  { id:'hack',      name:'Hack Squat',          spine:false, sets:3, reps:'5',     rir:'—',   note:'Box Jump eerst. Zachte landing, diep door knieën. Power-training essentieel op 48+.' },
  { id:'hack',      name:'Hack Squat',          spine:false, sets:4, reps:'10–12', rir:'1–2', note:'Voeten laag = meer quads. Rug volledig tegen steun. Eccentrisch 3 tellen.' },
  { id:'hipthrust', name:'Hip Thrust (barbell)',spine:false, sets:4, reps:'10–12', rir:'1–2', note:'Pad gebruiken. Billen samentrekken bovenin. Heupen volledig uitstrekken.' },
  { id:'legcurl',   name:'Seated Leg Curl',     spine:false, sets:4, reps:'10–12', rir:'2',   note:'Zittend = verlengde positie = superieur voor hamstring hypertrofie.' },
  { id:'calfseat',  name:'Seated Calf Raise',   spine:false, sets:4, reps:'12–15', rir:'1–2', note:'Knieën gebogen = soleus. Volledig zakken voor maximale stretch.' },
];

const MCGILL = [
  { name:'Modified Curl-up', detail:'3 × 8–10' },
  { name:'Bird Dog',         detail:'3 × 8/zij — 3 sec hold' },
  { name:'Side Plank',       detail:'3 × 20–30 sec' },
  { name:'Dead Bug',         detail:'3 × 8/zij' },
];

const MORNING = [
  { name:"Cat-cow",             detail:"10 herh." },
  { name:"Child's pose",        detail:"60 sec" },
  { name:"Knie naar borst",     detail:"30 sec/zij" },
  { name:"Dead Bug",            detail:"8/zij" },
  { name:"Glute Bridge",        detail:"15 reps" },
  { name:"Heupflexor stretch",  detail:"60 sec/zij" },
];

// ─────────────────────────────────────────
// STATE
// ─────────────────────────────────────────
let curWeek = 1;
let curDay  = 'ma';

// ─────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────
function calcKg(id, pct) {
  const raw = BASE[id] * pct / 100;
  return Math.round(raw / 2.5) * 2.5;
}
function fmtKg(id, pct) {
  const kg = calcKg(id, pct);
  const suffix = id === 'bss' ? ' kg/db' : ' kg';
  return (Number.isInteger(kg) ? kg : kg.toFixed(1)) + suffix;
}
function wClass(id, pct) {
  if (!SPINE.includes(id)) return 'wc-full';
  if (pct <= 55) return 'wc-rehab';
  if (pct <= 75) return 'wc-build';
  return 'wc-full';
}

// ─────────────────────────────────────────
// RENDER WEEK TABS
// ─────────────────────────────────────────
function renderWeekTabs() {
  document.getElementById('weekTabs').innerHTML = WEEKS.map(wk => {
    const pctClass = wk.phase === 'rehab' ? 'c-amber' : wk.phase === 'build' ? 'c-yellow' : 'c-green';
    return `<button class="wt ${wk.w === curWeek ? 'active' : ''}" onclick="switchWeek(${wk.w})">
      <span class="wt-num">Week ${wk.w}</span>
      <span class="wt-pct ${pctClass}">${wk.pct}%</span>
      <span class="wt-lbl">${wk.lbl}</span>
    </button>`;
  }).join('');
}

// ─────────────────────────────────────────
// RENDER PHASE BANNER
// ─────────────────────────────────────────
function renderPhaseBanner(wk) {
  const icons = { rehab:'🔶', build:'⚡', full:'✅' };
  const cls   = { rehab:'ph-rehab', build:'ph-build', full:'ph-full' };
  document.getElementById('phaseBanner').innerHTML = `
    <div class="phase-banner ${cls[wk.phase]}">
      <div class="pb-icon">${icons[wk.phase]}</div>
      <div class="pb-body">
        <div class="pb-title">${wk.lbl} — ${wk.desc}</div>
        <div class="pb-desc">Rugbelaste oefeningen op ${wk.pct}% · Upper op eigen gewicht · Overige lower 100%</div>
      </div>
      <div class="pb-date">${wk.date}</div>
    </div>`;
}

// ─────────────────────────────────────────
// RENDER MORNING ROUTINE
// ─────────────────────────────────────────
function renderMorning(wk) {
  const el = document.getElementById('morningRoutine');
  if (wk.phase !== 'rehab') { el.innerHTML = ''; return; }
  el.innerHTML = `<div class="morning-block">
    <div class="blk-title">🌅 Dagelijkse ochtendroutine — elke dag (5–10 min)</div>
    ${MORNING.map(m => `<div class="morning-row"><span>${m.name}</span><span>${m.detail}</span></div>`).join('')}
  </div>`;
}

// ─────────────────────────────────────────
// RENDER DAY TABS
// ─────────────────────────────────────────
function renderDayTabs() {
  document.getElementById('dayTabs').innerHTML = DAYS.map(d => {
    const isRest = d.type === 'rest';
    return `<button class="dt ${isRest ? 'is-rest' : ''} ${d.key === curDay ? 'active' : ''}" onclick="switchDay('${d.key}')">
      <span class="dt-name">${d.short}</span>
      <span class="dt-type">${d.lbl}</span>
    </button>`;
  }).join('');
}

// ─────────────────────────────────────────
// RENDER UPPER TABLE
// ─────────────────────────────────────────
function upperTable(exercises) {
  const rows = exercises.map(ex => `
    <tr class="${ex.ss ? 'ss-row' : ''}">
      <td class="td-name">${ex.name}${ex.ss ? '<span class="ss-pill">superset</span>' : ''}</td>
      <td class="td-sets">${ex.sets}×</td>
      <td class="td-reps">${ex.reps}</td>
      <td class="td-rir"><span class="rir-pill">RIR ${ex.rir}</span></td>
      <td class="td-note">${ex.note}</td>
    </tr>`).join('');
  return `<table class="ex-table">
    <thead><tr>
      <th>Oefening</th>
      <th style="text-align:center">Sets</th>
      <th style="text-align:center">Reps</th>
      <th style="text-align:center">RIR</th>
      <th>Techniek</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// ─────────────────────────────────────────
// RENDER LOWER TABLE
// ─────────────────────────────────────────
function lowerTable(exercises, pct) {
  const rows = exercises.map(ex => {
    const isSpine = ex.spine;
    // Special display for week 1 modified exercises
    let kg, cls;
    if (ex.name === 'Goblet Squat') { kg = '8–12 kg'; cls = 'wc-rehab'; }
    else if (ex.name === 'Bulgarian Split Squat' && !ex.spine) { kg = 'bodyweight'; cls = 'wc-rehab'; }
    else if (isSpine) { kg = fmtKg(ex.id, pct); cls = wClass(ex.id, pct); }
    else { kg = BASE[ex.id] ? fmtKg(ex.id, 100) : '—'; cls = 'wc-full'; }
    return `<tr>
      <td class="td-name">${ex.name}${isSpine ? '<span class="spine-pill">rugbelasting</span>' : ''}</td>
      <td class="td-sets">${ex.sets}×</td>
      <td class="td-weight ${cls}">${kg}</td>
      <td class="td-reps">${ex.reps}</td>
      <td class="td-rir"><span class="rir-pill">RIR ${ex.rir}</span></td>
      <td class="td-note">${ex.note}</td>
    </tr>`;
  }).join('');
  return `<table class="ex-table">
    <thead><tr>
      <th>Oefening</th>
      <th style="text-align:center">Sets</th>
      <th style="text-align:center">Gewicht</th>
      <th style="text-align:center">Reps</th>
      <th style="text-align:center">RIR</th>
      <th>Techniek</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// ─────────────────────────────────────────
// RENDER DAY CONTENT
// ─────────────────────────────────────────
function renderDayContent(wk) {
  const day = DAYS.find(d => d.key === curDay);
  const isRehab = wk.phase === 'rehab';
  let html = '';

  if (day.type === 'rest') {
    html = `<div class="rest-view">
      <div class="ri">🌙</div>
      <h3>${day.name} — Rustdag</h3>
      <p>Herstel is training. Cortisol daalt, spierweefsel repareert.<br><br>
      ${isRehab
        ? '💡 20–30 min wandelen op 50–60% HRmax versnelt herstel.'
        : '💡 7.000+ stappen · slaap 7–9u · eiwit 180g ook op rustdag.'
      }</p>
    </div>`;
    document.getElementById('dayContent').innerHTML = html;
    return;
  }

  // UPPER DAYS
  if (day.type === 'upper') {
    const exList = day.key === 'ma' ? UPPER_A : day.key === 'vr' ? UPPER_B : UPPER_C;
    html += upperTable(exList);
    html += `<div class="note"><strong>Gewichten:</strong> Bijgehouden in je eigen app. Dubbele progressie: bereik bovengrens reps op alle sets → volgende sessie +2–2,5 kg.</div>`;
    document.getElementById('dayContent').innerHTML = html;
    return;
  }

  // LOWER A
  if (day.type === 'lowerA') {
    if (isRehab) {
      html += `<div class="mcgill-block">
        <div class="blk-title">🏥 McGill Big 3 + Dead Bug — doe dit VÓÓR de sessie</div>
        ${MCGILL.map(m => `<div class="mcgill-row"><span>${m.name}</span><span>${m.detail}</span></div>`).join('')}
      </div>`;
    }
    html += lowerTable(getLowerA(wk.w), wk.pct);
    if (wk.w === 1) html += `<div class="note amber"><strong>Week 1:</strong> Goblet Squat i.p.v. barbell squat · Split squat op bodyweight · RDL op 40% (24 kg). Stop direct bij rugpijn. McGill elke ochtend verplicht.</div>`;
    else if (wk.w === 2) html += `<div class="note amber"><strong>Week 2:</strong> Terug naar barbell squat als week 1 pijnvrij was. Alle oefeningen op 50% werkgewicht. Bij twijfel → nog een week Goblet Squat.</div>`;
    else if (isRehab) html += `<div class="note amber"><strong>Week 3–4:</strong> Voel je de doelspier, niet de rug? Zo niet → gewicht omlaag.</div>`;
    else if (wk.phase === 'build') html += `<div class="note"><strong>Week 5–6:</strong> Dubbele progressie actief op rugbelaste oefeningen. Bovengrens reps bereikt? → +2,5 kg volgende sessie.</div>`;
    else html += `<div class="note green"><strong>Week 7–8:</strong> Bijna op volledig werkgewicht. Na week 8 volgt deload: gewicht –40%, volume –50%.</div>`;
    document.getElementById('dayContent').innerHTML = html;
    return;
  }

  // LOWER B
  if (day.type === 'lowerB') {
    html += lowerTable(LOWER_B, wk.pct);
    html += `<div class="note green"><strong>Hack Squat & Hip Thrust & Leg Curl & Calf Raise:</strong> Altijd op volledig gewicht — deze oefeningen belasten de rug minimaal. Focus op glute-activatie bij hip thrust.</div>`;
    if (wk.w === 8) html += `<div class="note green"><strong>Na week 8:</strong> Deload week. Gebruik 60% van je werkgewichten, zelfde oefeningen. Daarna volledig schema op 90–95%.</div>`;
    document.getElementById('dayContent').innerHTML = html;
    return;
  }
}

// ─────────────────────────────────────────
// TIPS (week 1 only)
// ─────────────────────────────────────────
function renderTips() {
  if (curWeek !== 1) return;
  const tips = [
    { icon:'🍑', title:'Glutes = rugbeschermer', body:'Zwakke glutes laten de lage rug compenseren bij elke beweging. Hip thrust en split squat zijn je beste investering.' },
    { icon:'⏱️', title:'Max 45 min zitten',      body:'Sta op, loop 2 min. Discusdruk bij langdurig zitten is hoger dan bij staan. Zet een timer.' },
    { icon:'📐', title:'Neutrale wervelkolom',    body:'Lichte lordose bij elke oefening én dagelijks. Niet vlak, niet overstrekt — minste druk op de disci.' },
    { icon:'🌙', title:'Slaaphouding',            body:'Niet op je buik — dat zet de lage rug 6–8u in hyperextensie. Zij- of rugligging met kussen tussen de knieën.' },
    { icon:'🔥', title:'Warming-up verplicht',    body:'Koud beginnen met squat of RDL vergroot het blessurerisico. Altijd 5 min beweging + McGill vóór lower sessies.' },
    { icon:'📏', title:'Heupflexoren stretchen',  body:'Strakke psoas trekt de lumbale wervelkolom in hyperextensie. Dagelijks 60 sec per zij.' },
  ];
  const existing = document.querySelector('.tips-section');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.className = 'tips-section';
  el.innerHTML = `<div class="tips-title">Tips voor permanent pijnvrije rug</div>
    <div class="tips-grid">${tips.map(t => `
      <div class="tip-card">
        <div class="tip-icon">${t.icon}</div>
        <div class="tip-title">${t.title}</div>
        <div class="tip-body">${t.body}</div>
      </div>`).join('')}
    </div>`;
  document.querySelector('.content-area').appendChild(el);
}

// ─────────────────────────────────────────
// SWITCH FUNCTIONS
// ─────────────────────────────────────────
function switchWeek(w) {
  curWeek = w;
  const wk = WEEKS[w - 1];
  renderWeekTabs();
  renderPhaseBanner(wk);
  renderMorning(wk);
  renderDayTabs();
  renderDayContent(wk);
  const existing = document.querySelector('.tips-section');
  if (existing) existing.remove();
  renderTips();
}

function switchDay(key) {
  curDay = key;
  const wk = WEEKS[curWeek - 1];
  renderDayTabs();
  renderDayContent(wk);
}

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
renderWeekTabs();
renderPhaseBanner(WEEKS[0]);
renderMorning(WEEKS[0]);
renderDayTabs();
renderDayContent(WEEKS[0]);
renderTips();
</script>
</body>
</html>
